<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Is the glitch systemic?</text>
  <text x="40" y="74" font-size="16" fill="#666">When a default treats one world as normal, the failure is not an accident</text>

  <!-- Box 1: Default -->
  <rect x="22" y="120" width="190" height="120" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="117" y="166" text-anchor="middle" font-size="17" font-weight="700" fill="#15171C">A default</text>
  <text x="117" y="192" text-anchor="middle" font-size="14" fill="#474C57">treats one group's</text>
  <text x="117" y="212" text-anchor="middle" font-size="14" fill="#474C57">world as normal</text>

  <!-- Arrow 1 -->
  <line x1="216" y1="180" x2="242" y2="180" stroke="#8a909c" stroke-width="3"/>
  <polygon points="242,173 256,180 242,187" fill="#8a909c"/>

  <!-- Box 2: Failure -->
  <rect x="262" y="120" width="190" height="120" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="357" y="166" text-anchor="middle" font-size="17" font-weight="700" fill="#15171C">A system fails</text>
  <text x="357" y="192" text-anchor="middle" font-size="14" fill="#474C57">someone, and it is</text>
  <text x="357" y="212" text-anchor="middle" font-size="14" fill="#474C57">called a glitch</text>

  <!-- Arrow 2 -->
  <line x1="456" y1="180" x2="482" y2="180" stroke="#8a909c" stroke-width="3"/>
  <polygon points="482,173 496,180 482,187" fill="#8a909c"/>

  <!-- Box 3: The test -->
  <rect x="502" y="120" width="156" height="120" rx="12" fill="#15171C"/>
  <text x="580" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">Ask the test:</text>
  <text x="580" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">accident, or</text>
  <text x="580" y="206" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">design working</text>
  <text x="580" y="226" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">as built?</text>

  <!-- Down arrow from test -->
  <line x1="580" y1="242" x2="580" y2="282" stroke="#DA291C" stroke-width="3"/>
  <polygon points="573,282 580,296 587,282" fill="#DA291C"/>

  <!-- Verdict box -->
  <rect x="262" y="296" width="396" height="74" rx="12" fill="#DA291C"/>
  <text x="460" y="330" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">If yes, it was never a glitch</text>
  <text x="460" y="354" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">the fix is the default, not the patch</text>

  <!-- Left note: worldbuilding -->
  <rect x="22" y="296" width="218" height="74" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="131" y="326" text-anchor="middle" font-size="14" font-weight="600" fill="#15171C">Database design is</text>
  <text x="131" y="348" text-anchor="middle" font-size="14" font-weight="600" fill="#15171C">worldbuilding</text>

  <text x="40" y="406" font-size="13" fill="#666">Benjamin (2019), default discrimination: is the glitch systemic?</text>
</svg>
