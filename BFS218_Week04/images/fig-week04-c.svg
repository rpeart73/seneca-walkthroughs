<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">It is not only street names</text>
  <text x="40" y="74" font-size="16" fill="#666">The same default logic sifts and sorts people across systems</text>

  <!-- Four system boxes -->
  <rect x="30" y="110" width="150" height="90" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="105" y="148" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Credit scores</text>
  <text x="105" y="172" text-anchor="middle" font-size="13" fill="#666">decide who is hired</text>

  <rect x="200" y="110" width="150" height="90" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="275" y="148" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Algorithms</text>
  <text x="275" y="172" text-anchor="middle" font-size="13" fill="#666">decide who sees what</text>

  <rect x="370" y="110" width="150" height="90" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="445" y="148" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Risk tools</text>
  <text x="445" y="172" text-anchor="middle" font-size="13" fill="#666">shape sentencing</text>

  <rect x="540" y="110" width="120" height="90" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="600" y="148" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Surveillance</text>
  <text x="600" y="172" text-anchor="middle" font-size="13" fill="#666">which blocks watched</text>

  <!-- Converging arrows to the shared default -->
  <line x1="105" y1="200" x2="320" y2="262" stroke="#8a909c" stroke-width="2.5"/>
  <line x1="275" y1="200" x2="335" y2="262" stroke="#8a909c" stroke-width="2.5"/>
  <line x1="445" y1="200" x2="350" y2="262" stroke="#8a909c" stroke-width="2.5"/>
  <line x1="600" y1="200" x2="365" y2="262" stroke="#8a909c" stroke-width="2.5"/>
  <polygon points="333,256 345,272 357,256" fill="#8a909c"/>

  <!-- Shared default bar -->
  <rect x="160" y="278" width="360" height="64" rx="12" fill="#DA291C"/>
  <text x="340" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Defaults built in an unequal world</text>
  <text x="340" y="328" text-anchor="middle" font-size="14" fill="#ffffff">each one sifts and sorts people the same way</text>

  <text x="40" y="392" font-size="15" font-weight="600" fill="#15171C">If the glitch is systemic, the fix is the default, not the patch.</text>
  <text x="40" y="420" font-size="13" fill="#666">Benjamin (2019), default discrimination.</text>
</svg>
