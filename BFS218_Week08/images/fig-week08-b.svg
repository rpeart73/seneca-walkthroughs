<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">From subject to steward</text>
  <text x="40" y="74" font-size="16" fill="#666">Who has the right to govern the data?</text>

  <!-- Default assumption -->
  <rect x="40" y="120" width="270" height="190" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="175" y="156" text-anchor="middle" font-size="17" font-weight="700" fill="#15171C">Most systems assume</text>
  <text x="175" y="196" text-anchor="middle" font-size="15" fill="#474C57">Whoever collects the data</text>
  <text x="175" y="218" text-anchor="middle" font-size="15" fill="#474C57">owns it</text>
  <text x="175" y="262" text-anchor="middle" font-size="15" font-weight="600" fill="#15171C">The community is the</text>
  <text x="175" y="284" text-anchor="middle" font-size="15" font-weight="600" fill="#15171C">subject of the data</text>

  <!-- Arrow -->
  <line x1="320" y1="215" x2="356" y2="215" stroke="#DA291C" stroke-width="4"/>
  <polygon points="356,205 374,215 356,225" fill="#DA291C"/>

  <!-- Data sovereignty -->
  <rect x="384" y="120" width="256" height="190" rx="12" fill="#DA291C"/>
  <text x="512" y="156" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Indigenous data</text>
  <text x="512" y="178" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">sovereignty</text>
  <text x="512" y="218" text-anchor="middle" font-size="15" fill="#ffffff">A community has the right</text>
  <text x="512" y="240" text-anchor="middle" font-size="15" fill="#ffffff">to govern data about itself</text>
  <text x="512" y="284" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">The community is the</text>
  <text x="512" y="306" text-anchor="middle" font-size="15" font-weight="600" fill="#ffffff">steward of the data</text>

  <text x="40" y="368" font-size="15" fill="#474C57">Indigenous data sovereignty begins from the opposite of the default.</text>
  <text x="40" y="406" font-size="13" fill="#666">OCAP, First Nations Information Governance Centre.</text>
</svg>
