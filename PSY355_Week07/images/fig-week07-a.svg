<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Linked but distinct</text>
  <text x="40" y="74" font-size="16" fill="#666">Stress, adversity, and recovery name different parts of one situation</text>

  <!-- Stress box -->
  <rect x="14" y="150" width="190" height="130" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="109" y="190" text-anchor="middle" font-size="19" font-weight="700" fill="#DA291C">Stress</text>
  <text x="109" y="220" text-anchor="middle" font-size="15" fill="#15171C">The pressure you</text>
  <text x="109" y="242" text-anchor="middle" font-size="15" fill="#15171C">feel in the moment</text>
  <text x="109" y="266" text-anchor="middle" font-size="13" fill="#8a909c">A response to a demand</text>

  <!-- arrow 1 -> 2 -->
  <line x1="208" y1="215" x2="232" y2="215" stroke="#8a909c" stroke-width="3"/>
  <polygon points="232,207 246,215 232,223" fill="#8a909c"/>

  <!-- Adversity box -->
  <rect x="250" y="150" width="190" height="130" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="345" y="190" text-anchor="middle" font-size="19" font-weight="700" fill="#DA291C">Adversity</text>
  <text x="345" y="220" text-anchor="middle" font-size="15" fill="#15171C">The barrier or</text>
  <text x="345" y="242" text-anchor="middle" font-size="15" fill="#15171C">hardship you face</text>
  <text x="345" y="266" text-anchor="middle" font-size="13" fill="#8a909c">Social, not just personal</text>

  <!-- arrow 2 -> 3 -->
  <line x1="444" y1="215" x2="468" y2="215" stroke="#8a909c" stroke-width="3"/>
  <polygon points="468,207 482,215 468,223" fill="#8a909c"/>

  <!-- Recovery box -->
  <rect x="486" y="150" width="180" height="130" rx="12" fill="#DA291C"/>
  <text x="576" y="190" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Recovery</text>
  <text x="576" y="220" text-anchor="middle" font-size="15" fill="#ffffff">The ordinary way</text>
  <text x="576" y="242" text-anchor="middle" font-size="15" fill="#ffffff">you steady again</text>
  <text x="576" y="266" text-anchor="middle" font-size="13" fill="#ffd9d5">Realistic, not dramatic</text>

  <text x="40" y="344" font-size="15" fill="#474C57">The central question: how can students recognize pressure</text>
  <text x="40" y="368" font-size="15" fill="#474C57">without letting pressure become the whole story?</text>

  <text x="40" y="408" font-size="13" fill="#666">PSY355 Week 7. Stress, adversity, and recovery as linked but distinct.</text>
</svg>
