<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">The social ecology of resilience</text>
  <text x="40" y="74" font-size="16" fill="#666">The person sits inside layers that shape what recovery is possible</text>

  <!-- Culture (outer) -->
  <rect x="200" y="100" width="280" height="300" rx="16" fill="#fbe9e7" stroke="#DA291C" stroke-width="2"/>
  <text x="340" y="124" text-anchor="middle" font-size="16" font-weight="700" fill="#DA291C">Culture</text>

  <!-- Community -->
  <rect x="240" y="142" width="200" height="234" rx="14" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="340" y="166" text-anchor="middle" font-size="15" font-weight="600" fill="#15171C">Community</text>

  <!-- Family -->
  <rect x="278" y="188" width="124" height="150" rx="12" fill="#eef1f4" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="340" y="212" text-anchor="middle" font-size="15" font-weight="600" fill="#15171C">Family</text>

  <!-- Individual (inner) -->
  <circle cx="340" cy="276" r="42" fill="#DA291C"/>
  <text x="340" y="272" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Individual</text>
  <text x="340" y="290" text-anchor="middle" font-size="11" fill="#ffffff">the person</text>

  <!-- Left side explanation -->
  <text x="40" y="150" font-size="15" font-weight="600" fill="#15171C">Each layer can:</text>
  <text x="40" y="180" font-size="14" fill="#474C57">offer a support</text>
  <text x="40" y="206" font-size="14" fill="#474C57">or place a barrier</text>
  <text x="40" y="248" font-size="14" fill="#474C57">Resilience is not</text>
  <text x="40" y="270" font-size="14" fill="#474C57">held by the person</text>
  <text x="40" y="292" font-size="14" fill="#474C57">alone. It is shared</text>
  <text x="40" y="314" font-size="14" fill="#474C57">across the layers.</text>

  <text x="40" y="424" font-size="13" fill="#666">PSY355 Week 6. Ungar (2011), the social ecology of resilience.</text>
</svg>
