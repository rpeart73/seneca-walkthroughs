<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Two responses to the same setback</text>
  <text x="40" y="74" font-size="16" fill="#666">The goal stays the same; only the strategy can change</text>

  <!-- Setback node -->
  <rect x="270" y="100" width="140" height="56" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="340" y="134" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">A setback</text>

  <!-- branch lines -->
  <line x1="300" y1="156" x2="150" y2="210" stroke="#8a909c" stroke-width="3"/>
  <line x1="380" y1="156" x2="530" y2="210" stroke="#8a909c" stroke-width="3"/>

  <!-- Rigid path -->
  <rect x="40" y="210" width="240" height="150" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="160" y="244" text-anchor="middle" font-size="18" font-weight="700" fill="#15171C">Rigid</text>
  <text x="160" y="276" text-anchor="middle" font-size="15" fill="#474C57">Keep the same method</text>
  <text x="160" y="300" text-anchor="middle" font-size="15" fill="#474C57">Push past every limit</text>
  <text x="160" y="324" text-anchor="middle" font-size="15" fill="#474C57">Persistence treated as</text>
  <text x="160" y="344" text-anchor="middle" font-size="15" fill="#474C57">the only proof of effort</text>

  <!-- Flexible path -->
  <rect x="400" y="210" width="240" height="150" rx="12" fill="#DA291C"/>
  <text x="520" y="244" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Flexible</text>
  <text x="520" y="276" text-anchor="middle" font-size="15" fill="#ffffff">Keep the goal</text>
  <text x="520" y="300" text-anchor="middle" font-size="15" fill="#ffffff">Change the strategy</text>
  <text x="520" y="324" text-anchor="middle" font-size="15" fill="#ffffff">Notice when a method</text>
  <text x="520" y="344" text-anchor="middle" font-size="15" fill="#ffffff">has stopped working</text>

  <text x="40" y="406" font-size="14" fill="#666">PSY355 Week 9: psychological flexibility is the partner of perseverance.</text>
</svg>
