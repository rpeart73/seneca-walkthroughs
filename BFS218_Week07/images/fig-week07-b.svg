<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Not separate machines</text>
  <text x="40" y="74" font-size="16" fill="#666">One system can carry all three dimensions at once</text>

  <!-- Central system node -->
  <circle cx="340" cy="250" r="64" fill="#DA291C"/>
  <text x="340" y="246" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">One</text>
  <text x="340" y="268" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">system</text>

  <!-- Dimension 1: amplify -->
  <rect x="44" y="120" width="190" height="78" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="139" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Engineered inequity</text>
  <text x="139" y="174" text-anchor="middle" font-size="14" fill="#474C57">amplifies a gap</text>
  <line x1="234" y1="170" x2="288" y2="222" stroke="#8a909c" stroke-width="3"/>
  <polygon points="282,214 294,228 278,226" fill="#8a909c"/>

  <!-- Dimension 2: defaults -->
  <rect x="446" y="120" width="190" height="78" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="541" y="150" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Default discrimination</text>
  <text x="541" y="174" text-anchor="middle" font-size="14" fill="#474C57">runs on the defaults</text>
  <line x1="446" y1="170" x2="392" y2="222" stroke="#8a909c" stroke-width="3"/>
  <polygon points="398,214 386,228 402,226" fill="#8a909c"/>

  <!-- Dimension 3: watches -->
  <rect x="245" y="332" width="190" height="78" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="340" y="362" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Coded exposure</text>
  <text x="340" y="386" text-anchor="middle" font-size="14" fill="#474C57">watches unevenly</text>
  <line x1="340" y1="332" x2="340" y2="316" stroke="#8a909c" stroke-width="3"/>
  <polygon points="333,316 340,304 347,316" fill="#8a909c"/>

  <text x="40" y="430" font-size="13" fill="#666">Found together in Canada: Clearview and the RCMP, Ewert v Canada, the digital border.</text>
</svg>
