<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Not a malfunction, a reproduction</text>
  <text x="40" y="74" font-size="16" fill="#666">How bias is built in, step by step</text>

  <!-- Box 1 -->
  <rect x="14" y="160" width="140" height="120" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="84" y="214" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">Unequal</text>
  <text x="84" y="238" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">society</text>
  <line x1="158" y1="220" x2="172" y2="220" stroke="#8a909c" stroke-width="3"/>
  <polygon points="172,213 184,220 172,227" fill="#8a909c"/>

  <!-- Box 2 -->
  <rect x="190" y="160" width="140" height="120" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="260" y="214" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">Training</text>
  <text x="260" y="238" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">data</text>
  <line x1="334" y1="220" x2="348" y2="220" stroke="#8a909c" stroke-width="3"/>
  <polygon points="348,213 360,220 348,227" fill="#8a909c"/>

  <!-- Box 3 -->
  <rect x="366" y="160" width="140" height="120" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="436" y="226" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">Algorithm</text>
  <line x1="510" y1="220" x2="524" y2="220" stroke="#8a909c" stroke-width="3"/>
  <polygon points="524,213 536,220 524,227" fill="#8a909c"/>

  <!-- Box 4 -->
  <rect x="542" y="160" width="124" height="120" rx="12" fill="#DA291C"/>
  <text x="604" y="208" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Inequity,</text>
  <text x="604" y="231" text-anchor="middle" font-size="14" fill="#ffffff">at scale and</text>
  <text x="604" y="250" text-anchor="middle" font-size="14" fill="#ffffff">speed</text>

  <text x="40" y="350" font-size="15" fill="#474C57">The data reflects the society; the algorithm learns the society.</text>
  <text x="40" y="392" font-size="13" fill="#666">Benjamin (2019), engineered inequity.</text>
</svg>
