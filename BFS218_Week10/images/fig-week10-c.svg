<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Where the inequality lives</text>
  <text x="40" y="74" font-size="16" fill="#666">Within the algorithm, and without it</text>

  <!-- Outer box: without -->
  <rect x="40" y="104" width="600" height="240" rx="14" fill="#fbe9e7" stroke="#DA291C" stroke-width="2"/>
  <text x="64" y="134" font-size="18" font-weight="700" fill="#DA291C">Without the algorithm</text>
  <text x="64" y="158" font-size="15" fill="#474C57">Who builds these systems, and who is subject to them</text>

  <!-- Inner box: within -->
  <rect x="120" y="184" width="440" height="130" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="340" y="222" text-anchor="middle" font-size="18" font-weight="700" fill="#15171C">Within the algorithm</text>
  <text x="340" y="252" text-anchor="middle" font-size="15" fill="#474C57">Its data and its design</text>
  <text x="340" y="282" text-anchor="middle" font-size="15" fill="#474C57">A ranking is a gate too</text>

  <text x="40" y="392" font-size="13" fill="#666">Devlin (2023), power in AI; Noble (2018), search and ranking present as neutral.</text>
</svg>
