<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Two Canadian anchors</text>
  <text x="40" y="74" font-size="16" fill="#666">Documented cases that name the harm</text>

  <!-- Clearview AI card -->
  <rect x="36" y="120" width="280" height="200" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="58" y="158" font-size="19" font-weight="700" fill="#15171C">Clearview AI and the RCMP</text>
  <text x="58" y="190" font-size="14" fill="#474C57">Scraped billions of images to</text>
  <text x="58" y="210" font-size="14" fill="#474C57">build a face-search tool.</text>
  <text x="58" y="238" font-size="14" fill="#474C57">The Privacy Commissioner found</text>
  <text x="58" y="258" font-size="14" fill="#474C57">the RCMP's use violated</text>
  <text x="58" y="278" font-size="14" fill="#474C57">federal privacy law.</text>
  <rect x="58" y="292" width="150" height="16" rx="8" fill="#DA291C"/>
  <text x="66" y="304" font-size="11" font-weight="700" fill="#ffffff">CODED EXPOSURE</text>

  <!-- Ewert card -->
  <rect x="364" y="120" width="280" height="200" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="386" y="158" font-size="19" font-weight="700" fill="#15171C">Ewert v Canada (2018)</text>
  <text x="386" y="190" font-size="14" fill="#474C57">The Supreme Court found</text>
  <text x="386" y="210" font-size="14" fill="#474C57">Correctional Service Canada</text>
  <text x="386" y="230" font-size="14" fill="#474C57">breached its duty by using risk</text>
  <text x="386" y="250" font-size="14" fill="#474C57">tools never validated for</text>
  <text x="386" y="270" font-size="14" fill="#474C57">Indigenous people.</text>
  <rect x="386" y="292" width="200" height="16" rx="8" fill="#DA291C"/>
  <text x="394" y="304" font-size="11" font-weight="700" fill="#ffffff">DEFAULT DISCRIMINATION</text>

  <text x="40" y="372" font-size="15" fill="#474C57">Named by federal oversight and by the highest court in the country.</text>
  <text x="40" y="408" font-size="13" fill="#666">Office of the Privacy Commissioner of Canada (2021); Ewert v Canada, 2018 SCC 30.</text>
</svg>
