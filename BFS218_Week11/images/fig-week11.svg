<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Reform or real repair?</text>
  <text x="40" y="74" font-size="16" fill="#666">Two ways to respond to a harmful system</text>

  <!-- Shared starting point -->
  <rect x="270" y="100" width="140" height="56" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="340" y="133" text-anchor="middle" font-size="16" font-weight="600" fill="#15171C">Harmful system</text>

  <!-- Branch lines -->
  <line x1="305" y1="156" x2="150" y2="208" stroke="#8a909c" stroke-width="3"/>
  <polygon points="150,208 165,204 158,217" fill="#8a909c"/>
  <line x1="375" y1="156" x2="530" y2="208" stroke="#DA291C" stroke-width="3"/>
  <polygon points="530,208 515,204 522,217" fill="#DA291C"/>

  <!-- Left path: Reform -->
  <rect x="40" y="216" width="250" height="156" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="165" y="248" text-anchor="middle" font-size="19" font-weight="700" fill="#15171C">Reform</text>
  <text x="60" y="284" font-size="14" fill="#474C57">Patch its worst edges</text>
  <text x="60" y="310" font-size="14" fill="#474C57">Keep the structure</text>
  <text x="60" y="336" font-size="14" fill="#474C57">Eases harm</text>
  <text x="60" y="362" font-size="14" font-weight="600" fill="#474C57">Power stays in place</text>

  <!-- Right path: Real repair -->
  <rect x="390" y="216" width="250" height="156" rx="12" fill="#DA291C"/>
  <text x="515" y="248" text-anchor="middle" font-size="19" font-weight="700" fill="#ffffff">Real repair</text>
  <text x="410" y="284" font-size="14" fill="#ffffff">Refuse the unjust system</text>
  <text x="410" y="310" font-size="14" fill="#ffffff">Build a just alternative</text>
  <text x="410" y="336" font-size="14" fill="#ffffff">Those most affected lead</text>
  <text x="410" y="362" font-size="14" font-weight="600" fill="#ffffff">Power changes hands</text>

  <text x="40" y="412" font-size="13" fill="#666">Design justice and abolitionist tools. Costanza-Chock (2020); Benjamin (2019).</text>
</svg>
