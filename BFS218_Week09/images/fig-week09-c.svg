<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 440" font-family="'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif">
  <rect width="680" height="440" fill="#ffffff"/>
  <text x="40" y="46" font-size="26" font-weight="700" fill="#15171C">Safety for whom?</text>
  <text x="40" y="74" font-size="16" fill="#666">Raising Robots: the helper framed as safety</text>

  <!-- Framed-as label -->
  <rect x="14" y="130" width="200" height="90" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="114" y="168" text-anchor="middle" font-size="17" font-weight="600" fill="#15171C">Police throwbot</text>
  <text x="114" y="192" text-anchor="middle" font-size="14" fill="#474C57">framed as safety</text>

  <line x1="218" y1="175" x2="244" y2="175" stroke="#8a909c" stroke-width="3"/>
  <polygon points="244,168 256,175 244,182" fill="#8a909c"/>

  <!-- The question -->
  <rect x="260" y="130" width="220" height="90" rx="12" fill="#DA291C"/>
  <text x="370" y="170" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">Ask: safety</text>
  <text x="370" y="196" text-anchor="middle" font-size="18" font-weight="700" fill="#ffffff">for whom?</text>

  <!-- Mechanism box -->
  <rect x="14" y="252" width="652" height="96" rx="12" fill="#f5f7f9" stroke="#cfd4db" stroke-width="1.5"/>
  <text x="40" y="284" font-size="15" fill="#15171C">Sent in first, so officers can own the real estate with their eyes</text>
  <text x="40" y="310" font-size="15" fill="#15171C">before paying with their bodies. The disposability of robots travels</text>
  <text x="40" y="336" font-size="15" fill="#15171C">with the denigration of racialized people.</text>

  <text x="40" y="392" font-size="13" fill="#666">Benjamin (2019), Raising Robots.</text>
</svg>
